input_path: tests/test_data/gemini_sample_data.csv
dropna: true
preprocessors:
train_test_split:
  test_size: 0.2
  random_state: 42
model:
  module: sklearn.linear_model.LogisticRegression
  target: Purchased
  args:
    random_state: 42
  feature_columns:
    - Age
    - Income
    - Years_of_Experience
evaluators:
  - type: LogisticEvaluator
    metrics:
      - accuracy_score
      - classification_report
      - roc_auc_score
